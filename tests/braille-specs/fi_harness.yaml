  - # Simple arrows
    - вҶҗ вҶ‘ вҶ— вҶҷ
    - в Јв Ө в Ңв ұ в ”в ұ в Јв ” 
  - # Double arrows
    - вҮ‘ вҮ— вҮ’ вҮҗ
    - в Ңв Ңв ұ в ”в ”в ұ в Өв Өв ұ в Јв Өв Ө
