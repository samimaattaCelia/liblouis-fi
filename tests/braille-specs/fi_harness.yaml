    - вҶ” вҶҰ вҶӨ
    - в Јв Өв ұ в ёв Өв ұ в Јв Өв ё
  - [17jГӨhrig, в јв Ғв ӣв °в ҡв ңв “в —в Ҡв ӣ] # Small letter sign, p. 37.
  - [<- ->, в Јв Ө в Өв ұ] # Arrows, p. 47.
  - ['1,50 10,56', в јв Ғв Ӯв ‘в ҡ в јв Ғв ҡв Ӯв ‘в Ӣ] # Decimal *comma*, p. 51.
  # Longer numbers, p. 51
  - ['10 000 10.000 13 520.78 13.520,78', в јв Ғв ҡ в јв ҡв ҡв ҡ в јв Ғв ҡв „в ҡв ҡв ҡ в јв Ғв ү в јв ‘в ғв ҡв „в ӣв “ в јв Ғв үв „в ‘в ғв ҡв Ӯв ӣв “]
  # Powers, p. 52. If 2nd power, number sign and digit omitted.
  - [m^2 m^3 m^ m^23 m^2., в Қв ¬ в Қв ¬в јв ү в Қв ¬ в Қв ¬в јв ғв ү в Қв ¬в „]
  - # Fractions, p. 52. The convention used here does not conform to mathematical standard, but using the mathematical standard would cause ambiguity in literary texts. Vulgar fractions are converted as well, especially because vulgar fractions are widely used in, for example, cookbooks, the readers of which can't be expected to know mathematical braille.
    - 1/2 3/4 9/10 1 / 2 Вј
    - в јв Ғ в Ңв јв ғ в јв ү в Ңв јв ҷ в јв Ҡ в Ңв јв Ғв ҡ в јв Ғ в Ң в јв ғ в јв Ғ в Ңв јв ҷ
  - # Plus sign, p. 53 - again, non-conforming compromise for literary texts.
    - 5+2 5 +2 a+
    - в јв ‘в –в јв ғ в јв ‘ в –в јв ғ в Ғв –
  - # Minus signs and hyphens, p. 53. The first one is unicode MINUS SYMBOL, second one a hyphen.
    - 5вҲ’2 5-2 aвҲ’
    - в јв ‘ в Өв јв ғ в јв ‘в Өв јв ғ в Ғв Ө
  - # Multiplication, division and slash, p. 53. Unambiguously follows the standard. Note that '5/2' is not considered a fraction, but a division.
    - 5Г—2 5Г·2 5/2
    - в јв ‘ в „в јв ғ в јв ‘ в ’в јв ғ в јв ‘ в Ңв јв ғ
  - # Dates and times, p. 55.
    - '31.12.1999 1.-15.6.1999 1998-2000 klo 21.00 klo 12:30 klo 8.15-10.30 24.45,8'
    - в јв үв Ғв „в Ғв ғв „в Ғв Ҡв Ҡв Ҡ в јв Ғв „в Өв јв Ғв ‘в „в Ӣв „в Ғв Ҡв Ҡв Ҡ в јв Ғв Ҡв Ҡв “в Өв јв ғв ҡв ҡв ҡ в …в Үв • в јв ғв Ғв „в ҡв ҡ в …в Үв • в јв Ғв ғв ’в үв ҡ в …в Үв • в јв “в „в Ғв ‘в Өв јв Ғв ҡв „в үв ҡ в јв ғв ҷв „в ҷв ‘в Ӯв “
  - # Currencies, p. 57.
    - 5 вӮ¬ $20
    - в јв ‘ в Ҳв ‘ в ®в јв ғв ҡ
  - # (Some) uncommon foreign letters, p. 38.
    - Гі Г“ ГІГ’ ГҜ Г®
    - в ҳв • в  в ҳв • в ҳв •в  в ҳв • в ҳв Ҡ в ҳв Ҡ
  - # URLs and email addresses, p. 45.
    - 'http://www.hel.fi/linkit nvkirja@nvkirjasto.fi'
    - в “в һв һв Ҹв ’в Ңв Ңв әв әв әв „в “в ‘в Үв „в Ӣв Ҡв Ңв Үв Ҡв қв …в Ҡв һ в қв §в …в Ҡв —в ҡв Ғв Ҳв қв §в …в Ҡв —в ҡв Ғв Һв һв •в „в Ӣв Ҡ
  - # Underlines, p. 39
    - Tietoa saa NГӨkГ¶vammaisten Keskusliitosta.
    - в  в һв Ҡв ‘в һв •в Ғ в Һв Ғв Ғ в ¬в  в қв ңв …в Әв §в Ғв Қв Қв Ғв Ҡв Һв һв ‘в қ в ¬в  в …в ‘в Һв …в Ҙв Һв Үв Ҡв Ҡв һв •в Һв һв Ғв „
    # if the period is not bold then liblouis assumes that the
    # emphasis stops inside a word and adds an end emphasis indicator.
    # For that reason the period is also marked up as bold.
    - {typeform: {bold: '           ++++++++++++++++++++++++++++++'}}
  - # Bold, p. 39
    - HГӨn kiinnitti huomiota jГӨrjestysluvun taivutukseen sanassa tuhannennen.
    - в  в “в ңв қ в …в Ҡв Ҡв қв қв Ҡв һв һв Ҡ в “в Ҙв •в Қв Ҡв •в һв Ғ в ¬в ҡв ңв —в ҡв ‘в Һв һв Ҫв Һв Үв Ҙв §в Ҙв қ в һв Ғв Ҡв §в Ҙв һв Ҙв …в Һв ‘в ‘в қ в Һв Ғв қв Ғв Һв Һв Ғ в һв Ҙв “в Ғв қв ¬в қв ‘в қв ¬в қв ‘в қв „
    - typeform:
        underline: '                       ++++++++++++++                           +++    '
  - # Italic, p. 40
    - Ei kaikki ole kultaa, mikГӨ kiiltГӨГӨ.
    - в  в ‘в Ҡ в Ёв …в Ғв Ҡв …в …в Ҡ в •в Үв ‘ в …в Ҙв Үв һв Ғв Ғв Ӯ в Ёв Қв Ҡв …в ң в …в Ҡв Ҡв Үв һв ңв ңв „
    - typeform:
        italic: '   ++++++             ++++         '
  - # Longer emphasized phrase, p. 39
    - TГӨmГӨ on yli kolmen sanan testi.
    - в  в һв ңв Қв ң в ¬в ¬в •в қ в Ҫв Үв Ҡ в …в •в Үв Қв ‘в қ в Һв Ғв қв Ғв қ в ¬в һв ‘в Һв һв Ҡв „
    # if the period is not bold then liblouis assumes that the
    # emphasis stops inside a word and adds an end emphasis indicator.
    # For that reason the period is also marked up as bold.
    - typeform:
        underline: '     ++++++++++++++++++++++++++'

  - # Character additions:
    # Copyright symbol, registered trademark symbol, trademark symbol.
    # Not covered by the official specification document, but
    # conventionally marked as (c), (r) and tm.
    - В© В® в„ў
    - в Ұв үв ҙ в Ұв —в ҙ в һв Қ

  - # Unknown characters.
    # Not covered by the official specification document, but
    # conventionally replaced with an asterisk.
    - бғ’ в—Ҹ
    - в ” в ”

  - # Emphasis only at the beginning of a word
    - valtionpГӨГӨmies
    - в Ёв §в Ғв Үв һв Ҡв •в қв Ёв Ҹв ңв ңв Қв Ҡв ‘в Һ
    - typeform:
        italic: '+++++++       '
  - # Emphasis only in the middle of a word
    - valtionpГӨГӨmies
    - в §в Ғв Үв һв Ҡв •в қв Ёв Ҹв ңв ңв Ёв Қв Ҡв ‘в Һ
    - typeform:
        italic: '       +++    '
  - # Emphasis only at the end of a word. According to a Finish
    # braille expert this case is not specified, i.e. whether an
    # indicator is needed if the emphasis ends at word end. So we
    # assume no indicator is needed
    - valtionpГӨГӨmies
    - в §в Ғв Үв һв Ҡв •в қв Ҹв ңв ңв Ёв Қв Ҡв ‘в Һ
    - typeform:
        italic: '          ++++'
  - # Emphasis at the beginning and the end of a word, but not in the middle
    - valtionpГӨГӨmies
    - в Ёв §в Ғв Үв һв Ҡв •в қв Ёв Ҹв ңв ңв Ёв Қв Ҡв ‘в Һв Ё
    - typeform:
        italic: '+++++++   ++++'
      xfail: this test also fails in master, i.e. w/o the UEB improvements

